services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: home-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - path: .env
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${HOME_MINIO_BIND_ADDRESS:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${HOME_MINIO_BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: home-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    volumes:
      - ./scripts:/scripts:ro

  web-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home-minio-web-api
    restart: unless-stopped
    working_dir: /app
    env_file:
      - path: .env
        required: false
    environment:
      HOME_MINIO_WEB_API_PORT: ${HOME_MINIO_WEB_API_PORT:-19090}
      HOME_MINIO_WEB_TOKEN: ${HOME_MINIO_WEB_TOKEN}
      HOME_MINIO_STATE_DB: ${HOME_MINIO_STATE_DB:-/data/state/home-minio.sqlite}
      HOME_MINIO_CONFIG_ENCRYPTION_KEY: ${HOME_MINIO_CONFIG_ENCRYPTION_KEY:-}
      HOME_MINIO_CONFIG_ENCRYPTION_KEY_FILE: ${HOME_MINIO_CONFIG_ENCRYPTION_KEY_FILE:-/run/secrets/home_minio_config_encryption_key}
      HOME_MINIO_TRANSFER_WORK_DIR: ${HOME_MINIO_TRANSFER_WORK_DIR:-/data/transfer-work}
    command: ["node", "/app/web/backend/server.mjs"]
    ports:
      - "${HOME_MINIO_BIND_ADDRESS:-127.0.0.1}:${HOME_MINIO_WEB_API_PORT:-19090}:${HOME_MINIO_WEB_API_PORT:-19090}"
    volumes:
      - .:/app
      - /app/node_modules
      - ${HOME_MINIO_STATE_DIR:-./state}:/data/state
      - ${HOME_MINIO_TRANSFER_WORK_HOST_DIR:-./transfer-work}:/data/transfer-work
      - /data/backup:/data/backup
      - /root/.bypy:/root/.bypy
      - ${BAIDUPCS_CONFIG_DIR:-/root/.config/BaiduPCS-Go}:/root/.config/BaiduPCS-Go
      - /var/run/docker.sock:/var/run/docker.sock
    secrets:
      - source: home_minio_config_encryption_key
        target: home_minio_config_encryption_key

  web:
    image: nginx:1.27-alpine
    container_name: home-minio-web
    restart: unless-stopped
    depends_on:
      - web-api
    ports:
      - "${HOME_MINIO_BIND_ADDRESS:-127.0.0.1}:${HOME_MINIO_WEB_PORT:-19091}:80"
    volumes:
      - ./web/frontend:/usr/share/nginx/html:ro

  backup-scheduler:
    image: node:22-alpine
    container_name: home-minio-backup-scheduler
    restart: unless-stopped
    working_dir: /app
    env_file:
      - path: .env
        required: false
    command: >
      sh -c "apk add --no-cache bash ca-certificates coreutils curl docker-cli python3 py3-pip unzip &&
      /app/scripts/install-baidupcs-go.sh &&
      python3 -m pip install --break-system-packages --no-cache-dir bypy &&
      /app/scripts/run-baidupan-backup-scheduler.sh"
    volumes:
      - .:/app
      - /data/backup:/data/backup
      - /root/.bypy:/root/.bypy
      - ${BAIDUPCS_CONFIG_DIR:-/root/.config/BaiduPCS-Go}:/root/.config/BaiduPCS-Go
      - /var/run/docker.sock:/var/run/docker.sock

secrets:
  home_minio_config_encryption_key:
    file: ${HOME_MINIO_CONFIG_ENCRYPTION_KEY_HOST_FILE:-/dev/null}
