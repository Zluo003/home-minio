services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: home-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - path: .env
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-long-password}
    ports:
      - "${HOME_MINIO_BIND_ADDRESS:-0.0.0.0}:${MINIO_API_PORT:-19000}:9000"
      - "${HOME_MINIO_BIND_ADDRESS:-0.0.0.0}:${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - ${MINIO_DATA_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: home-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-long-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-waule-media}
      MINIO_WAULE_ACCESS_KEY: ${MINIO_WAULE_ACCESS_KEY:-waule-newwaule}
      MINIO_WAULE_SECRET_KEY: ${MINIO_WAULE_SECRET_KEY:-change-me-minio-secret}
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    volumes:
      - ./scripts:/scripts:ro

  web-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home-minio-web-api
    restart: unless-stopped
    working_dir: /app
    env_file:
      - path: .env
        required: false
    environment:
      HOME_MINIO_WEB_API_PORT: ${HOME_MINIO_WEB_API_PORT:-19090}
      HOME_MINIO_WEB_TOKEN: ${HOME_MINIO_WEB_TOKEN:-}
      HOME_MINIO_STATE_DB: ${HOME_MINIO_STATE_DB:-/data/state/home-minio.sqlite}
      HOME_MINIO_TRANSFER_WORK_DIR: ${HOME_MINIO_TRANSFER_WORK_DIR:-/data/transfer-work}
      MINIO_INTERNAL_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-waule-media}
      MINIO_WAULE_ACCESS_KEY: ${MINIO_WAULE_ACCESS_KEY:-waule-newwaule}
      MINIO_WAULE_SECRET_KEY: ${MINIO_WAULE_SECRET_KEY:-change-me-minio-secret}
    command: ["node", "/app/web/backend/server.mjs"]
    ports:
      - "${HOME_MINIO_BIND_ADDRESS:-0.0.0.0}:${HOME_MINIO_WEB_API_PORT:-19090}:${HOME_MINIO_WEB_API_PORT:-19090}"
    volumes:
      - .:/app
      - /app/node_modules
      - ${HOME_MINIO_STATE_DIR:-./state}:/data/state
      - ${HOME_MINIO_TRANSFER_WORK_HOST_DIR:-./transfer-work}:/data/transfer-work
      - /data/backup:/data/backup
      - /root/.bypy:/root/.bypy
      - ${BAIDUPCS_CONFIG_DIR:-/root/.config/BaiduPCS-Go}:/root/.config/BaiduPCS-Go
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    image: nginx:1.27-alpine
    container_name: home-minio-web
    restart: unless-stopped
    depends_on:
      - web-api
    environment:
      HOME_MINIO_WEB_API_PORT: ${HOME_MINIO_WEB_API_PORT:-19090}
    ports:
      - "${HOME_MINIO_BIND_ADDRESS:-0.0.0.0}:${HOME_MINIO_WEB_PORT:-19091}:80"
    volumes:
      - ./web/frontend:/usr/share/nginx/html:ro
      - ./web/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

  backup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home-minio-backup-scheduler
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - web-api
    env_file:
      - path: .env
        required: false
    environment:
      HOME_MINIO_STATE_DB: ${HOME_MINIO_STATE_DB:-/data/state/home-minio.sqlite}
    command: ["/app/scripts/run-baidupan-backup-scheduler.sh"]
    volumes:
      - .:/app
      - /app/node_modules
      - ${HOME_MINIO_STATE_DIR:-./state}:/data/state
      - /data/backup:/data/backup
      - /root/.bypy:/root/.bypy
      - ${BAIDUPCS_CONFIG_DIR:-/root/.config/BaiduPCS-Go}:/root/.config/BaiduPCS-Go
      - /var/run/docker.sock:/var/run/docker.sock
