services:
  minio:
    image: quay.io/minio/minio:RELEASE.2026-06-13T11-33-47Z
    container_name: home-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:RELEASE.2026-06-13T12-46-12Z
    container_name: home-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    volumes:
      - ./scripts:/scripts:ro

  web-api:
    image: node:22-alpine
    container_name: home-minio-web-api
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      HOME_MINIO_WEB_API_PORT: ${HOME_MINIO_WEB_API_PORT:-19090}
      HOME_MINIO_WEB_TOKEN: ${HOME_MINIO_WEB_TOKEN}
    command: >
      sh -c "apk add --no-cache bash curl docker-cli &&
      node /app/web/backend/server.mjs"
    ports:
      - "${HOME_MINIO_WEB_API_PORT:-19090}:${HOME_MINIO_WEB_API_PORT:-19090}"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    image: nginx:1.27-alpine
    container_name: home-minio-web
    restart: unless-stopped
    depends_on:
      - web-api
    ports:
      - "${HOME_MINIO_WEB_PORT:-19091}:80"
    volumes:
      - ./web/frontend:/usr/share/nginx/html:ro

  backup-scheduler:
    image: node:22-alpine
    container_name: home-minio-backup-scheduler
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "apk add --no-cache bash coreutils docker-cli &&
      /app/scripts/run-baidupan-backup-scheduler.sh"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
