<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home MinIO 控制台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <div>
          <p class="eyebrow">NewWaule Cold Media</p>
          <h1>Home MinIO 控制台</h1>
        </div>
        <nav>
          <a href="#status">状态</a>
          <a href="#config">配置</a>
          <a href="#newwaule">NewWaule</a>
          <a href="#transfer">媒体传输</a>
          <a href="#backup">备份</a>
        </nav>
        <p class="hint">配置保存到 home-minio 服务器 `.env`。NewWaule 连接信息需要填到 NewWaule 管理后台。</p>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <strong id="statusText">读取中</strong>
            <span id="portText">-</span>
          </div>
          <button id="refreshButton">刷新</button>
        </header>

        <section id="status" class="panel status-grid">
          <div>
            <span>MinIO</span>
            <strong id="minioState">-</strong>
          </div>
          <div>
            <span>百度网盘</span>
            <strong id="baidupanState">-</strong>
          </div>
          <div>
            <span>工具</span>
            <strong id="toolState">-</strong>
          </div>
          <div>
            <span>媒体生命周期</span>
            <strong id="lifecycleState">-</strong>
          </div>
        </section>

        <section id="config" class="panel">
          <div class="section-head">
            <h2>配置</h2>
            <button id="saveButton">保存配置</button>
          </div>
          <form id="configForm" class="config-grid"></form>
        </section>

        <section id="newwaule" class="panel">
          <div class="section-head">
            <h2>NewWaule 后台配置</h2>
            <button id="copyConfigButton">复制</button>
          </div>
          <pre id="newWauleConfig" class="output output--compact">等待读取。</pre>
        </section>

        <section id="transfer" class="panel">
          <div class="section-head">
            <h2>媒体传输</h2>
          </div>
          <pre id="transferStatus" class="output output--compact">等待读取。</pre>
        </section>

        <section id="backup" class="panel">
          <div class="section-head">
            <h2>备份与恢复</h2>
            <div class="actions">
              <button id="dryRunButton">备份演练</button>
              <button id="backupButton">立即备份</button>
              <button id="pullManifestDryRunButton">拉取演练</button>
              <button id="pullManifestButton">按清单拉取</button>
              <button id="installCronButton">保存自动备份</button>
              <button id="showCronButton">查看计划</button>
              <button id="restoreDryRunButton">恢复演练</button>
            </div>
          </div>
          <pre id="output" class="output">等待操作。</pre>
        </section>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
